<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Login Page</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; }
        .alert-error { color: #721c24; background: #f8d7da; padding: 10px; display: none; margin-top: 10px; }
        .alert-success { color: #155724; background: #d4edda; padding: 10px; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Login (Mock UI)</h2>
    <form id="loginForm">
        <div class="form-group"><input type="email" id="email" placeholder="Email" required></div>
        <div class="form-group"><input type="password" id="password" placeholder="Password" required></div>
        <button type="submit">Login</button>
    </form>
    
    <div class="alert-error"></div>
    <div class="alert-success"></div>
    
    <script>
        // 1. load mockUsers
        const mockUsers = []
        async function loadMockUsers() {
            try {
                // ยิงไป URL จำลอง เดี๋ยว Playwright จะดักจับแล้วส่งไฟล์ CSV ให้
                const response = await fetch('https://mock-api.com/data/user.csv');
                const csvText = await response.text();
                
                const lines = csvText.trim().split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',').map(v => v.trim());
                    let user = {};
                    headers.forEach((h, index) => {
                        user[h] = values[index];
                    });
                    mockUsers.push(user);
                }
                console.log("Mock Users Loaded from CSV:", mockUsers);
            } catch (error) {
                console.error("Failed to load CSV:", error);
            }
        }

        loadMockUsers();


        // ตัวแปรเก็บจำนวนครั้งที่ผิดของแต่ละ Email
        const attemptTracker = {}; 

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const errorAlert = document.querySelector('.alert-error');
            const successAlert = document.querySelector('.alert-success');
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!attemptTracker[email]) {
                attemptTracker[email] = { count: 0, isLocked: false };
            }

            // check email is locked
            if (attemptTracker[email].isLocked) {
                errorAlert.textContent = 'Account locked due to 5 failed attempts. Try again in 15 minutes.';
                errorAlert.style.display = 'block';
                return; // หยุดการทำงานทันที
            }

            // user alredy register
            const user = mockUsers.find(u => u.email === email);

            // incorrect password
            if (!user || user.password !== password) {
                attemptTracker[email].count += 1; // นับเพิ่ม 1 ครั้ง

                // login attempt more thant 5 time
                if (attemptTracker[email].count >= 5) {
                    attemptTracker[email].isLocked = true;
                    errorAlert.textContent = 'Account locked due to 5 failed attempts. Try again in 15 minutes.';
                } else {
                    errorAlert.textContent = `Invalid credentials. Attempt ${attemptTracker[email].count}/5`;
                }
                errorAlert.style.display = 'block';
                return;
            }

            // login success
            attemptTracker[email].count = 0;
            successAlert.textContent = `Login Success! Name: ${user.name}, Token: ${user.token}`;
            successAlert.style.display = 'block';
        });
    </script>
</body>
</html>
