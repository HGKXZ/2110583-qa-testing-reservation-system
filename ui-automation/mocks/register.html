<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Register Page</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; }
        
        /* สไตล์สำหรับแจ้งเตือน ซ่อนไว้เป็นค่าเริ่มต้น */
        .alert-error { color: #721c24; background: #f8d7da; padding: 10px; display: none; margin-top: 10px; }
        .alert-success { color: #155724; background: #d4edda; padding: 10px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Register (Mock UI)</h2>
    
    <form id="registerForm">
        <div class="form-group"><input type="text" id="name" placeholder="Name" required></div>
        <div class="form-group"><input type="email" id="email" placeholder="Email" required></div>
        <div class="form-group"><input type="text" id="phone" placeholder="Phone" required></div>
        <div class="form-group"><input type="password" id="password" placeholder="Password" required></div>
        <button type="submit">Register</button>
    </form>

    <div class="alert-error"></div>
    <div class="alert-success"></div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีเฟรช

            const errorAlert = document.querySelector('.alert-error');
            const successAlert = document.querySelector('.alert-success');
            
            // ซ่อนข้อความเก่าก่อน
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            // ดึงข้อมูลจากฟอร์ม
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            try {
                // จำลองการยิง API ไปที่ /auth/register
                const response = await fetch('https://mock-api.com/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, password })
                });

                const data = await response.json();

                // แสดงผลตาม HTTP Status Code ที่ได้กลับมา
                if (response.status === 200 || response.status === 201) {
                    successAlert.textContent = data.message;
                    successAlert.style.display = 'block';
                } else {
                    errorAlert.textContent = data.message;
                    errorAlert.style.display = 'block';
                }
            } catch (error) {
                errorAlert.textContent = 'Network error or unhandled request';
                errorAlert.style.display = 'block';
            }
        });
    </script>
</body>
</html>
