info:
  name: BF-009-004 (1)
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/tables/available?date=2026-04-15&time=18:00&guestCount=2"
  params:
    - name: date
      value: 2026-04-15
      type: query
    - name: time
      value: 18:00
      type: query
    - name: guestCount
      value: "2"
      type: query
  body:
    type: json
    data: ""
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setEnvVar("reservationId", data.reservationId);
    - type: tests
      code: |-
        test("ตรวจสอบโต๊ะว่างเริ่มต้น", function() {
          const data = res.getBody();
          
          // 1. ตรวจสอบ Status Code
          expect(res.getStatus()).to.equal(200);

          // 2. ตรวจสอบว่ามี Property tables และเป็น Array
          // Chai ใช้ .to.be.an('array') หรือ .to.exist
          expect(data.tables).to.be.an('array');

          // 3. บันทึกจำนวนโต๊ะว่าง (ลบการเขียนทับซ้ำซ้อนออก)
          const count = Number(data.availableCount);
          
          // ตรวจสอบว่า count เป็นตัวเลขจริงๆ ไม่ใช่ NaN
          expect(count).to.be.a('number');
          
          bru.setVar("initialCount", count);
          
          // log ดูค่าเพื่อความมั่นใจ (ดูได้ที่ Console ของ Bruno)
          console.log("Initial Tables Count:", count);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
