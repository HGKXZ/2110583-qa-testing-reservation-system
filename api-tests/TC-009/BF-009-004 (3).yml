    - name: guestCount
      value: "2"
      type: query
  body:
    type: json
    data: ""
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("โต๊ะที่จองไปแล้วต้องไม่ปรากฏในรายการ", function() {
          
          const data = res.getBody();
          // ดึงค่า ID ที่จองไว้ และจำนวนตั้งต้นมาจากตัวแปรของ Bruno
          const bookedId = parseInt(bru.getVar("bookedTableId"));
          const initialCount = parseInt(bru.getVar("initialCount"));
          
          // 1. ตรวจสอบว่าโต๊ะ ID นี้ไม่อยู่ในรายการที่คืนกลับมา (Dynamic filtering)
          const isTableGone = !data.tables.some(t => t.tableId === bookedId);
          
          // ใช้รูปแบบของ Chai Assertion
          expect(isTableGone).to.be.true;
          
          // 2. ตรวจสอบว่าจำนวนโต๊ะว่างลดลง 1 ตัว
          expect(data.availableCount).to.equal(initialCount - 1);
        });

settings:
