info:
  name: register
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "TC",
        "email": "{{customerEmail}}",
        "password": "{{customerPass}}",
        "phone": "0818328864"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
