info:
  name: TC-003-001
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/forgot-password"
  body:
    type: json
    data: |-
      {
        "email" : "{{customerEmail}}",
        "newPassword" : "Pass1234",
        "confirmPassword" : "Pass1234"
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (data.resetToken){
          bru.setEnvVar("token", data.resetToken);
        }
    - type: tests
      code: |-
        // ตรวจ status code
        test("Status 200 OK", () => {
          expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
