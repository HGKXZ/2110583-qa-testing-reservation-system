info:
  name: TC-003-004
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/auth/reset-password"
  body:
    type: json
    data: |-
      {  
        "token" : "{{token}}",
        "newPassword" : "Pass1234",
        "confirmPassword" : "Pass1234"
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (data.resetToken){
          bru.setEnvVar("token", data.resetToken);
        }
    - type: tests
      code: |-
        // ตรวจ status code
        test("Status 400 bad request", () => {
          expect(res.getStatus()).to.equal(400);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
