info:
  name: TC-002-001
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "test@example.com",
        "password": "Pass1234"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Response time < 1000ms", () => {
          expect(res.getResponseTime()).to.be.below(1000);
        });

        // ตรวจ status code
        test("Login success", () => {
          expect(res.getStatus()).to.equal(200);
        });

        // ตรวจ token มีใน response
        test("Has token", () => {
          expect(res.getBody().token).to.be.a("string");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
