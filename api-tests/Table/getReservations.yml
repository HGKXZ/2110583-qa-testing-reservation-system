info:
  name: getReservations
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/admin/reservations"
  body:
    type: json
    data: ""
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setEnvVar("reservationId", data.reservationId);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
