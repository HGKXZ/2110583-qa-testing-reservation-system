info:
  name: AF-012-001
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/tables/available?date=2026-05-20&time=18:00&guestCount=2"
  params:
    - name: date
      value: 2026-05-20
      type: query
    - name: time
      value: 18:00
      type: query
    - name: guestCount
      value: "2"
      type: query
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("เช็กว่าโต๊ะที่สถานะเป็น OCCUPIED จะไม่ปรากฏในรายการ", function() {
          const data = res.getBody();
          
          // ดึง ID ของโต๊ะที่เราเพิ่งเปลี่ยนเป็น OCCUPIED มา (สมมติว่าเป็น ID ที่เราเก็บไว้)
          const occupiedTableId = Number(bru.getVar("occupiedTableId"));
          const initialCount = Number(bru.getVar("initialCount"));

          // 1. ตรวจสอบว่าโต๊ะ ID นี้ต้องไม่อยู่ใน array tables
          const isTableFound = data.tables.some(t => t.tableId === occupiedTableId);
          expect(isTableFound).to.be.false;

          // 2. ตรวจสอบว่าจำนวนโต๊ะว่างลดลงจริง
          // เช่น ถ้าเดิมมี 3 แล้วเราทำ OCCUPIED ไป 1 ตัว ต้องเหลือ 2
          expect(data.availableCount).to.equal(initialCount - 1);
          
          // 3. ตรวจสอบว่า API คืนสถานะ 200 OK
          expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
