info:
  name: TC-001-006
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |+
      {
        "name": "John Doe",
        "email": "dup@test.com",
        "password": "Pass1234",
        "phone": "0812345678"
      }

  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status code is 409", function() {
          expect(res.getStatus()).to.equal(409);
        });

        test("Error message Authentication required", function(){
          expect(res.getBody.error === "Email already exists");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
