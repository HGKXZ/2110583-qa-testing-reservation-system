info:
  name: TC-001-004
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "name": "John123",
        "email": "tc001004@test.com",
        "password": "Pass1234",
        "phone": "0812345678"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status code is 400", function() {
          expect(res.getStatus()).to.equal(400);
        });

        test("Error message Authentication required", function(){
          expect(res.getBody.error === "Authentication required");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
